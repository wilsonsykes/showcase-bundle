name: Deploy Static Bundle to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON data files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          files = [
              Path('brand-hub/data/links.json'),
              Path('showcase-site/data/categories.json'),
              Path('showcase-site/data/products.json'),
          ]

          for f in files:
              try:
                  json.loads(f.read_text(encoding='utf-8'))
              except Exception as e:
                  raise SystemExit(f'Invalid JSON in {f}: {e}')

          print('JSON validation passed.')
          PY

      - name: Build Pages artifact
        run: |
          mkdir -p _site
          cp -R brand-hub _site/brand-hub
          cp -R showcase-site _site/showcase-site
          cp -R showcase-admin _site/showcase-admin

          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Showcase Bundle</title>
            <style>
              :root{--bg:#f7f2e9;--ink:#201b16;--muted:#6f665b;--line:#dfd5c8;--card:#fff;--accent:#8b6b3d}
              *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
              main{max-width:760px;margin:0 auto;padding:48px 20px}
              h1{margin:0 0 8px;font-size:2rem} p{margin:0 0 24px;color:var(--muted)}
              .grid{display:grid;grid-template-columns:1fr;gap:12px}
              a.card{display:block;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:12px;padding:16px 18px;text-decoration:none;color:inherit}
              .title{font-weight:700;margin-bottom:4px} .desc{color:var(--muted);font-size:.95rem}
              .note{margin-top:20px;font-size:.92rem;color:var(--muted)}
            </style>
          </head>
          <body>
            <main>
              <h1>Showcase Bundle</h1>
              <p>Public entry points for the static apps.</p>
              <div class="grid">
                <a class="card" href="./showcase-site/">
                  <div class="title">Showcase Site</div>
                  <div class="desc">Product and category catalog.</div>
                </a>
                <a class="card" href="./brand-hub/">
                  <div class="title">Brand Hub</div>
                  <div class="desc">Umbrella brand drill-down and materials links.</div>
                </a>
                <a class="card" href="./showcase-admin/admin-dashboard.html">
                  <div class="title">Admin Dashboard</div>
                  <div class="desc">Manage products, categories, links, and API sync.</div>
                </a>
              </div>
              <div class="note">Admin is deployed in this same Pages site. Protect API writes using a strong admin key.</div>
            </main>
          </body>
          </html>
          HTML

          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
